global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: user-service
    static_configs:
      - targets: ['user-service:4001']
    metrics_path: /metrics

  - job_name: movie-service
    static_configs:
      - targets: ['movie-service:4002']
    metrics_path: /metrics

  - job_name: review-service
    static_configs:
      - targets: ['review-service:4003']
    metrics_path: /metrics

  - job_name: gateway
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: /metrics
